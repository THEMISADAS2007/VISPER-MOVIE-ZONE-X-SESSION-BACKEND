<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISPER ZONE X | Connection Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #E50914;
            --bg: #000000;
            --glass: rgba(18, 18, 18, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #220608, transparent 50%);
            z-index: -1;
        }

        nav {
            padding: 20px 6%; display: flex; justify-content: space-between;
            position: fixed; width: 100%; z-index: 1000; backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .hero { padding: 140px 20px 40px; text-align: center; }
        .hero h1 { font-size: clamp(2rem, 7vw, 4rem); font-weight: 800; letter-spacing: -2px; margin-bottom: 10px; }

        /* --- TABS SYSTEM --- */
        .tabs {
            display: flex; background: rgba(255,255,255,0.05);
            padding: 5px; border-radius: 14px; margin-bottom: 30px;
        }
        .tab {
            flex: 1; padding: 12px; border-radius: 10px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: 0.3s; text-align: center;
        }
        .tab.active { background: var(--primary); color: white; }

        /* --- MAIN PANEL --- */
        .glass-panel {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 28px; padding: 35px; max-width: 480px;
            margin: 0 auto 100px; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(40px);
        }

        .content-section { display: none; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* QR AREA */
        .qr-area { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #qrImage {
            width: 220px; height: 220px; background: white;
            padding: 10px; border-radius: 15px; border: 4px solid var(--primary);
        }

        .steps-box { text-align: left; width: 100%; margin-top: 15px; }
        .step { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
        .step-num { 
            background: var(--primary); width: 22px; height: 22px; 
            border-radius: 50%; font-size: 0.7rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .step-text { font-size: 0.85rem; color: var(--text-dim); }

        /* COMMON UI */
        input {
            width: 100%; padding: 18px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 16px; color: white;
            font-size: 1rem; text-align: center; outline: none; margin-bottom: 15px;
        }
        input:focus { border-color: var(--primary); }

        .btn {
            width: 100%; padding: 18px; background: var(--primary);
            color: white; border: none; border-radius: 16px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); background: #ff1f2a; }

        .loader {
            width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 0.8rem; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<nav>
    <div style="font-weight: 800; letter-spacing: -1px;">VISPER <span>ZONE X</span></div>
    <div style="font-size: 0.7rem; font-weight: 800; color: var(--primary);">OFFICIAL HUB</div>
</nav>

<header class="hero">
    <h1>Connect Your Bot.</h1>
    <p style="color: var(--text-dim);">Select your preferred method to link WhatsApp.</p>
</header>

<div class="glass-panel">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('qr')">QR CODE</div>
        <div class="tab" onclick="switchTab('pair')">PAIRING CODE</div>
    </div>

    <div id="qrSection" class="content-section active">
        <div class="qr-area" id="qrArea">
            <div id="qrLoading" class="loader"></div>
            <img id="qrImage" src="" style="display:none;" alt="QR Code">
            <p id="status" style="font-size: 0.9rem; font-weight: 600; color: #00ffa3;">Requesting QR...</p>
            
            <div class="steps-box" id="steps">
                </div>
            <button class="btn" onclick="generateQR()" style="background: transparent; border: 1px solid var(--border); margin-top: 10px;">RELOAD QR</button>
        </div>
    </div>

    <div id="pairSection" class="content-section">
        <input type="tel" id="phoneNumber" placeholder="947xxxxxxxx">
        <button class="btn" id="pairBtn">GET PAIRING CODE</button>
        
        <div id="pairResult" style="display:none; text-align:center; margin-top:20px;">
            <div class="loader" id="pairLoader" style="display:none;"></div>
            <div id="codeDisplay">
                <small style="color: var(--text-dim);">ENTER THIS CODE:</small>
                <h2 id="pairCode" style="font-size: 2.5rem; letter-spacing: 8px; color: #00ffa3; margin-top: 10px;"></h2>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 VISPER INC. | THEMI SADAS</p>
    <p style="margin-top: 5px; font-weight: 800; color: white;">OVNIX DEVELOPMENTS</p>
</footer>

<script>
    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        
        if(type === 'qr') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('qrSection').classList.add('active');
            generateQR();
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('pairSection').classList.add('active');
        }
    }

    // QR GENERATOR LOGIC
    async function generateQR() {
        const qrImg = document.getElementById('qrImage');
        const status = document.getElementById('status');
        const loader = document.getElementById('qrLoading');
        const stepsEl = document.getElementById('steps');

        loader.style.display = 'block';
        qrImg.style.display = 'none';
        status.textContent = "Connecting...";

        try {
            const res = await fetch('/qr');
            const data = await res.json();

            if (data.qr) {
                qrImg.src = data.qr;
                qrImg.style.display = 'block';
                status.textContent = data.message || 'Scan with WhatsApp';
                
                stepsEl.innerHTML = '';
                (data.instructions || ["Open WhatsApp", "Menu > Linked Devices", "Link a Device"]).forEach((step, i) => {
                    const text = step.replace(/^\d+\.\s*/, '');
                    stepsEl.innerHTML += `
                        <div class="step">
                            <div class="step-num">${i + 1}</div>
                            <div class="step-text">${text}</div>
                        </div>`;
                });
                loader.style.display = 'none';
            }
        } catch (err) {
            status.textContent = "Failed to load QR. Try again.";
            loader.style.display = 'none';
        }
    }

    // PAIRING CODE LOGIC
    document.getElementById('pairBtn').addEventListener('click', async () => {
        const num = document.getElementById('phoneNumber').value.trim();
        const resArea = document.getElementById('pairResult');
        const loader = document.getElementById('pairLoader');
        const codeDisplay = document.getElementById('codeDisplay');
        const codeText = document.getElementById('pairCode');

        if(num.length < 10) return alert("Valid number input!");

        resArea.style.display = 'block';
        loader.style.display = 'block';
        codeDisplay.style.display = 'none';

        try {
            const { data } = await axios(`/code?number=${num}`);
            loader.style.display = 'none';
            if(data.code) {
                codeDisplay.style.display = 'block';
                codeText.innerText = data.code;
            }
        } catch (e) {
            loader.style.display = 'none';
            alert("Error connecting to server.");
        }
    });

    // Start with QR load
    window.onload = generateQR;
</script>

</body>
</html>
